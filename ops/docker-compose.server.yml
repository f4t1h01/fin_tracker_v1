services:
  api:
    image: ghcr.io/${GHCR_OWNER}/cft-api:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    image: ghcr.io/${GHCR_OWNER}/cft-web:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    depends_on:
      - api

  bot:
    image: ghcr.io/${GHCR_OWNER}/cft-bot:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      - api
