services:
  api:
    command: ["/bin/sh", "/app/ops/docker/start-api-prod.sh"]
    environment:
      NODE_ENV: production
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - pnpm_store:/pnpm/store

  web:
    command: ["/bin/sh", "/app/ops/docker/start-web-prod.sh"]
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
      - web_next:/app/apps/web/.next

  bot:
    command: ["/bin/sh", "/app/ops/docker/start-bot-prod.sh"]
    environment:
      NODE_ENV: production
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - pnpm_store:/pnpm/store

volumes:
  root_node_modules:
  pnpm_store:
  web_next:
