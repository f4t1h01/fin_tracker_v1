services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: api
    env_file:
      - .env
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: web
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api
    extra_hosts:
      - "host.docker.internal:host-gateway"

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: bot
    env_file:
      - .env
    depends_on:
      - api
    extra_hosts:
      - "host.docker.internal:host-gateway"
