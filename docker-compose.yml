services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: api
    env_file:
      - .env
    expose:
      - "4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: web
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_TELEGRAM_BOT_NAME: ${NEXT_PUBLIC_TELEGRAM_BOT_NAME}
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      - api
    extra_hosts:
      - "host.docker.internal:host-gateway"

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: bot
    env_file:
      - .env
    depends_on:
      - api
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "71:80"
    volumes:
      - ./ops/nginx.conf:/etc/nginx/conf.d/default.conf:ro
