services:
  api:
    command: sh -c "pnpm install --frozen-lockfile && pnpm --filter @repo/db prisma:generate && pnpm --filter @app/api dev"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - pnpm_store:/pnpm/store

  web:
    command: sh -c "pnpm install --frozen-lockfile && pnpm --filter @repo/db prisma:generate && pnpm --filter @app/web dev"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
      - web_next:/app/apps/web/.next

  bot:
    command: sh -c "pnpm install --frozen-lockfile && pnpm --filter @repo/db prisma:generate && pnpm --filter @app/bot dev"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - pnpm_store:/pnpm/store

volumes:
  root_node_modules:
  pnpm_store:
  web_next:
